apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: foo-k8s-operators
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/gpt14/argocd.git
    targetRevision: main
    path: charts/helm-app-of-apps
  destination:
    server: "https://kubernetes.default.svc"
    namespace: operators
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
